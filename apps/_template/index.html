<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="__APP_THEME__">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="__APP_SHORT_NAME__">
  <title>__APP_NAME__</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <link rel="stylesheet" href="../../shared/mobile-runtime.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-app-preset="__APP_PRESET__">
  <main class="app-shell" data-app-shell data-keyboard-aware>
    <header class="app-header" data-ui>
      <p class="app-kicker">__PRESET_LABEL__ / POCKET WORKS</p>
      <h1>__APP_NAME__</h1>
      <p class="selectable-content">__APP_DESCRIPTION__</p>
    </header>

    <section class="stage" aria-labelledby="stage-title">
      __PRESET_MARKUP__
    </section>

    <footer data-ui>
      <span>__APP_SLUG__</span>
      <span>v__APP_VERSION__ · __APP_STATUS__</span>
    </footer>
  </main>

  <script src="./app.js" type="module"></script>
</body>
</html>
