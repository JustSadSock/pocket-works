<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#171a18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ИЗНАНКА">
  <title>ИЗНАНКА</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../shared/mobile-runtime.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell" data-app-shell data-fullscreen-app>
    <canvas id="game" aria-label="Игровое поле ИЗНАНКИ" data-gesture-surface data-block-callout></canvas>

    <section id="loading" class="screen loading-screen is-visible" data-ui>
      <div class="loom-mark" aria-hidden="true"><i></i><i></i><i></i></div>
      <p class="eyebrow">Pocket Works представляет</p>
      <h1>ИЗНАНКА</h1>
      <p id="loadingText">Натягиваем нити мира…</p>
      <div class="loading-track"><span id="loadingBar"></span></div>
    </section>

    <section id="titleScreen" class="screen title-screen" data-ui>
      <div class="title-art" aria-hidden="true">
        <div class="half half-bloom"></div><div class="rip"></div><div class="half half-ash"></div>
      </div>
      <div class="title-copy">
        <p class="eyebrow">Пиксельная action‑RPG</p>
        <h1>ИЗНАНКА</h1>
        <p>Город сшит из двух реальностей. Переключай слой, разрывай врагов между мирами и реши, какой из них останется настоящим.</p>
      </div>
      <div class="menu-stack">
        <button id="continueButton" class="cloth-button primary" data-native-press>Продолжить</button>
        <button id="newGameButton" class="cloth-button" data-native-press>Новая история</button>
        <button id="titleSettingsButton" class="cloth-button" data-native-press>Звук и управление</button>
        <button class="cloth-button launcher-button" data-return-launcher data-native-press>Вернуться в Pocket Works</button>
      </div>
      <p class="version">v1.0.0 · сохранение на устройстве</p>
    </section>

    <section id="hud" class="hud" data-ui aria-hidden="true">
      <div class="hud-top">
        <div class="vitals">
          <div class="bar health"><span id="healthBar"></span><b id="healthText">100</b></div>
          <div class="bar resolve"><span id="resolveBar"></span></div>
        </div>
        <div class="hud-buttons"><button id="potionButton" class="icon-button potion-button" aria-label="Использовать настой" data-native-press>+<small id="potionCount">2</small></button><button id="pauseButton" class="icon-button" aria-label="Пауза" data-native-press>Ⅱ</button></div>
      </div>
      <div class="quest-ribbon"><span id="questChapter">ПРОЛОГ</span><b id="questText">Найди Миру у костра</b></div>
      <div id="layerBadge" class="layer-badge bloom"><span></span><b>ЛИЦО</b></div>
      <div id="bossBar" class="boss-bar" hidden><p id="bossName">БОСС</p><div><span id="bossHealth"></span></div></div>
      <button id="contextButton" class="context-button" hidden data-native-press>Говорить</button>
    </section>

    <section id="controls" class="controls" data-ui aria-hidden="true">
      <div id="joystick" class="joystick" data-gesture-surface data-block-callout>
        <div id="stick" class="stick"></div>
      </div>
      <div class="action-cluster">
        <button id="interactButton" class="action interact" aria-label="Взаимодействовать" data-native-press>⋯<small>ДЕЛО</small></button>
        <button id="skillButton" class="action skill" aria-label="Игла" data-native-press>✦<small>ИГЛА</small></button>
        <button id="shiftButton" class="action shift" aria-label="Сменить слой" data-native-press>⇄<small>СЛОЙ</small></button>
        <button id="attackButton" class="action attack" aria-label="Атака" data-native-press>╱<small>УДАР</small></button>
        <button id="dashButton" class="action dash" aria-label="Рывок" data-native-press>››<small>РЫВОК</small></button>
      </div>
    </section>

    <section id="modalRoot" class="modal-root" data-ui aria-live="polite"></section>
    <div id="toast" class="toast" data-ui role="status"></div>
    <div id="seamTransition" class="seam-transition" aria-hidden="true"></div>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
