<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#171b17"><title>БЛАЗОН — восстановление</title><style>:root{color-scheme:dark;font-family:Inter,system-ui,sans-serif;background:#171b17;color:#eadcb5}body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:24px;text-align:center}main{max-width:420px}h1{font-family:Georgia,serif;font-size:34px;margin:0 0 12px}p{line-height:1.5;color:#c9bb97}.seal{width:62px;height:62px;border:2px solid #c79b42;border-radius:50%;display:grid;place-items:center;margin:0 auto 20px;color:#c79b42;font-size:28px}</style></head><body><main><div class="seal">✦</div><h1>Восстановление БЛАЗОНА</h1><p id="status">Удаляю несовместимые исполняемые файлы. Сохранённый поход останется на устройстве.</p></main><script>(async()=>{const BUILD='5.5.0',status=document.querySelector('#status');try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.filter(reg=>reg.scope.includes('/apps/blazon/')).map(reg=>reg.unregister()))}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.filter(key=>key.startsWith('blazon-')).map(key=>caches.delete(key)))}status.textContent='Загружаю цельный релиз 5.5.0…';const target=new URL('./',location.href);target.searchParams.set('pw_release',BUILD);target.searchParams.set('recovered',Date.now().toString(36));location.replace(target.href)}catch(error){console.error(error);status.textContent='Не удалось восстановить релиз. Проверь соединение и повтори попытку.'}})();</script></body></html>
