<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#171b17">
  <title>БЛАЗОН — восстановление</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,system-ui,sans-serif;background:#171b17;color:#eadcb5}
    body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:24px;text-align:center}
    main{max-width:420px}h1{font-family:Georgia,serif;font-size:34px;margin:0 0 12px}p{line-height:1.5;color:#c9bb97}
    .seal{width:62px;height:62px;border:2px solid #c79b42;border-radius:50%;display:grid;place-items:center;margin:0 auto 20px;color:#c79b42;font-size:28px}
  </style>
</head>
<body><main><div class="seal">✦</div><h1>Восстановление БЛАЗОНА</h1><p id="status">Удаляю несовместимые версии и старые кэши. Твой поход сохранится.</p></main>
<script>
(async()=>{
  const BUILD='5.3.0',status=document.querySelector('#status');
  try{
    if('serviceWorker'in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.filter(reg=>reg.scope.includes('/apps/blazon/')).map(reg=>reg.unregister()));
    }
    if('caches'in window){
      const keys=await caches.keys();
      await Promise.all(keys.filter(key=>key.startsWith('blazon-')).map(key=>caches.delete(key)));
    }
    sessionStorage.setItem('blazon-recovered-build',BUILD);
    status.textContent='Кэш очищен. Получаю цельную версию 5.3.0…';
    const source=new URL('./index.html',location.href);
    source.searchParams.set('build',BUILD);
    source.searchParams.set('recovered',Date.now().toString(36));
    const response=await fetch(source.href,{cache:'no-store'});
    if(!response.ok)throw new Error(`index ${response.status}`);
    let html=await response.text();
    html=html.replaceAll('v=4.3.0',`v=${BUILD}`).replace('<footer>v4.3 · battle reading</footer>',`<footer>v${BUILD} · recovery build · единый кэш</footer>`);
    const target=new URL('./',location.href);target.searchParams.set('build',BUILD);target.searchParams.set('recovered',Date.now().toString(36));
    history.replaceState(null,'',target.href);
    document.open();document.write(html);document.close();
  }catch(error){
    console.error(error);status.textContent='Не удалось получить свежую версию. Закрой вкладку и открой эту страницу ещё раз.';
  }
})();
</script></body></html>
