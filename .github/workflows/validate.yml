name: Validate Pocket Works

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  change-scope:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enforce isolated application PR scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ALLOW_PLATFORM_CHANGES: ${{ contains(github.event.pull_request.labels.*.name, 'platform-change') }}
        run: npm run validate:scope

  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install build dependencies
        run: npm install --no-audit --no-fund

      - name: Build published Enhanced apps
        run: npm run build:enhanced

      - name: Validate self-registering app manifests
        run: npm run registry:check

      - name: Check script syntax
        run: npm run validate:scripts

      - name: Validate app configs
        run: npm run validate:configs

      - name: Validate PWA structure
        run: npm run validate

      - name: Validate mobile runtime
        run: npm run validate:mobile

      - name: Validate managed updates
        run: npm run validate:updates

      - name: Validate launcher shelf
        run: npm run validate:launcher

      - name: Validate shared capabilities
        run: npm run validate:capabilities

      - name: Validate Enhanced runtime
        run: npm run validate:enhanced

      - name: Validate browser quality contract
        run: npm run validate:quality

      - name: Test published Enhanced apps
        run: npm run test:enhanced

      - name: Smoke-test Quick presets
        run: npm run test:forge:quick

      - name: Assemble production site and generated registry
        run: npm run prepare:site

      - name: Validate production site
        run: npm run validate:site

  enhanced-presets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install build dependencies
        run: npm install --silent --no-audit --no-fund

      - name: Generate, build and test Enhanced presets
        run: npm run test:forge:enhanced

      - name: Upload Enhanced smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enhanced-smoke-report
          path: enhanced-smoke-report.txt
          if-no-files-found: error
          retention-days: 14

  browser-quality:
    needs: health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Assemble browser test site
        run: npm run build:quality-site

      - name: Run Playwright mobile matrix
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 14

  lighthouse:
    needs: health
    runs-on: ubuntu-latest
    env:
      CHROME_PATH: /usr/bin/google-chrome
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Assemble Lighthouse site
        run: npm run build:quality-site

      - name: Run Lighthouse budgets
        run: npm run test:lighthouse

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            quality-artifacts/lighthouse
            .lighthouseci
          if-no-files-found: warn
          retention-days: 14
