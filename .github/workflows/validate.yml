name: Validate Pocket Works

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install build dependencies
        run: npm install --no-audit --no-fund

      - name: Build published Enhanced apps
        run: npm run build:enhanced

      - name: Check generated registry
        run: npm run registry:check

      - name: Check script syntax
        run: npm run validate:scripts

      - name: Validate app configs
        run: npm run validate:configs

      - name: Validate PWA structure
        run: npm run validate

      - name: Validate mobile runtime
        run: npm run validate:mobile

      - name: Validate managed updates
        run: npm run validate:updates

      - name: Validate launcher shelf
        run: npm run validate:launcher

      - name: Validate shared capabilities
        run: npm run validate:capabilities

      - name: Validate Enhanced runtime
        run: npm run validate:enhanced

      - name: Test published Enhanced apps
        run: npm run test:enhanced

      - name: Smoke-test Quick presets
        run: npm run test:forge:quick

      - name: Smoke-test Enhanced presets
        run: npm run test:forge:enhanced
