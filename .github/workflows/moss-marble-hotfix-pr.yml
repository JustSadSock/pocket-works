name: Apply Moss & Marble 1.9.1 hotfix

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply-hotfix:
    if: github.head_ref == 'agent/moss-marble-1-9-1-hole-clearance' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply patch
        run: python .github/scripts/moss-marble-hotfix.py

      - name: Verify Moss & Marble
        run: |
          node --check apps/moss-marble/procedural.js
          node --check apps/moss-marble/course19.js
          node --check apps/moss-marble/audit19.mjs
          node apps/moss-marble/audit19.mjs

      - name: Commit verified hotfix
        run: |
          git config user.name "Pocket Works Agent"
          git config user.email "actions@users.noreply.github.com"
          git add apps/moss-marble/procedural.js apps/moss-marble/course19.js apps/moss-marble/audit19.mjs apps/moss-marble/app.config.json apps/moss-marble/sw.js apps/moss-marble/index.html
          git commit -m "Moss & Marble 1.9.1: очистить подход к лунке"
          git push origin HEAD:${{ github.head_ref }}
