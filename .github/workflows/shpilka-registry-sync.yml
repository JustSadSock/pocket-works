name: Sync ШПИЛЬКА registry

on:
  pull_request:
    paths:
      - apps/shpilka/app.config.json
      - .github/workflows/shpilka-registry-sync.yml

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run registry:build
      - uses: actions/upload-artifact@v4
        with:
          name: generated-apps-registry
          path: apps.json
          if-no-files-found: error
