name: Regenerate Petlya Velocity registry

on:
  push:
    branches: [agent/petlya-17-velocity-core]
    paths:
      - ".github/workflows/regenerate-petlya-velocity-registry.yml"

permissions:
  contents: write

jobs:
  registry:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/petlya-17-velocity-core
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/build-registry.mjs
      - run: git rm .github/workflows/regenerate-petlya-velocity-registry.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git commit -m "Register Petlya 17 Velocity Core"
          git push origin HEAD:agent/petlya-17-velocity-core
