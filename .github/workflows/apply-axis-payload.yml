name: Apply AXIS payload

on:
  push:
    branches:
      - agent/axis-2-0
    paths:
      - .axis-payload/READY

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out payload branch
        uses: actions/checkout@v4
        with:
          ref: agent/axis-2-0
          fetch-depth: 0

      - name: Decode and apply ОСЬ 2.0
        shell: bash
        run: |
          set -euo pipefail
          cat .axis-payload/part-* > /tmp/axis.b64
          base64 --decode /tmp/axis.b64 > /tmp/axis.tar.xz
          tar -xJf /tmp/axis.tar.xz
          rm -rf .axis-payload

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A apps/seam .axis-payload
          git commit -m "ОСЬ 2.0 — заменить ШОВ тактикой формаций"
          git push origin HEAD:agent/axis-2-0
