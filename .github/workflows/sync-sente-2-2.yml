name: Sync SENTE 2.2 Registry

on:
  push:
    branches:
      - agent/sente-ios-gnugo-2-2

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/sente-ios-gnugo-2-2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12'
      - run: node scripts/build-registry.mjs
      - name: Commit generated registry
        run: |
          if git diff --quiet -- apps.json; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps.json
          git commit -m "Generate SENTE 2.2 registry entry"
          git push origin HEAD:agent/sente-ios-gnugo-2-2
