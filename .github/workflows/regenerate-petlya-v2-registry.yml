name: Regenerate Petlya 17 v2 registry

on:
  push:
    branches: [agent/petlya-17-v2]
    paths:
      - ".github/workflows/regenerate-petlya-v2-registry.yml"

permissions:
  contents: write

jobs:
  registry:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/petlya-17-v2
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate registry
        run: node scripts/build-registry.mjs

      - name: Remove one-shot workflow
        run: git rm .github/workflows/regenerate-petlya-v2-registry.yml

      - name: Commit registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git commit -m "Register Petlya 17 v2"
          git push origin HEAD:agent/petlya-17-v2
