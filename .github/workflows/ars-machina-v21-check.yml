name: ARS MACHINA 2.1 check

on:
  push:
    branches:
      - agent/ars-machina-visual-diagnostics
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check engine syntax
        shell: bash
        run: |
          set -euo pipefail
          cd apps/ars-machina
          python3 - <<'PY'
          import re
          from pathlib import Path
          source = Path('app.js').read_text()
          parts = re.findall(r"'\./engine/(part-[^']+\.txt)'", source)
          joined = '\n'.join(Path('engine', part).read_text() for part in parts)
          joined = joined.replace("const APP_VERSION = '1.2.0';", "const APP_VERSION = '2.1.0';")
          Path('/tmp/ars-machina-engine.mjs').write_text(joined)
          print(f'assembled {len(parts)} engine modules')
          PY
          node --check /tmp/ars-machina-engine.mjs
      - name: Run deterministic tests
        shell: bash
        run: |
          set -euo pipefail
          node apps/ars-machina/tests/v16-smoke.mjs
          node apps/ars-machina/tests/v16-transmission.mjs
          node apps/ars-machina/tests/v20-codex.mjs
          node apps/ars-machina/tests/v21-interactions.mjs
          node apps/ars-machina/tests/v21-runtime.mjs
