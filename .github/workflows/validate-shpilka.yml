name: Validate Shpilka
on:
  pull_request:
    paths: ["apps/shpilka/**", "scripts/audit-shpilka-2-3.mjs", "package.json"]
  push:
    branches: [main]
    paths: ["apps/shpilka/**", "scripts/audit-shpilka-2-3.mjs", "package.json"]
permissions:
  contents: read
jobs:
  runtime-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - id: audit
        continue-on-error: true
        run: |
          set +e
          node --check apps/shpilka/engine-v2-23.js > shpilka-audit.log 2>&1
          first=$?
          node --check scripts/audit-shpilka-2-3.mjs >> shpilka-audit.log 2>&1
          second=$?
          node scripts/audit-shpilka-2-3.mjs >> shpilka-audit.log 2>&1
          third=$?
          test "$first" = 0 -a "$second" = 0 -a "$third" = 0
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shpilka-audit-log
          path: shpilka-audit.log
      - run: test '${{ steps.audit.outcome }}' = 'success'
