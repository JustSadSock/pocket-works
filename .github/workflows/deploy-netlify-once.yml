name: Validate Pocket Works production

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-netlify-once.yml"
      - "apps/**"
      - "*.html"
      - "*.js"
      - "*.css"
      - "manifest.webmanifest"
      - "netlify.toml"
      - "package.json"
      - "scripts/**"
      - "shared/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pocket-works-production-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: npm install --no-audit --no-fund

      - name: Run exhaustive production validation
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run ci:full 2>&1 | tee /tmp/pocket-works-build.log
          exit_code=${PIPESTATUS[0]}
          sed -r 's/\x1B\[[0-9;]*[mK]//g' /tmp/pocket-works-build.log | tail -n 240 > pocket-works-build-tail.log
          exit "$exit_code"

      - name: Upload production validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-validation-${{ github.sha }}
          path: pocket-works-build-tail.log
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce validation result
        if: always()
        run: |
          test '${{ steps.install.outcome }}' = 'success'
          test '${{ steps.build.outcome }}' = 'success'
