name: Validate Pocket Works production

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-netlify-once.yml"
      - "apps/**"
      - "apps.json"
      - "*.html"
      - "*.js"
      - "*.css"
      - "manifest.webmanifest"
      - "netlify.toml"
      - "package.json"
      - "scripts/**"
      - "shared/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pocket-works-production-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: npm install --no-audit --no-fund

      - name: Generate application registry
        id: registry
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run registry:build

      - name: Build and validate site
        id: build
        if: steps.registry.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run build:site 2>&1 | tee /tmp/pocket-works-build.log
          exit_code=${PIPESTATUS[0]}
          sed -r 's/\x1B\[[0-9;]*[mK]//g' /tmp/pocket-works-build.log | tail -n 180 > /tmp/pocket-works-build-tail.log
          exit "$exit_code"

      - name: Record validation result
        if: always()
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          REGISTRY_OUTCOME: ${{ steps.registry.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          printf '{\n  "sourceCommit": "%s",\n  "recordedAt": "%s",\n  "install": "%s",\n  "registry": "%s",\n  "build": "%s",\n  "auth": "not-required",\n  "deploy": "delegated-to-netlify-git"\n}\n' \
            "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$INSTALL_OUTCOME" "$REGISTRY_OUTCOME" "$BUILD_OUTCOME" \
            > .github/deploy-status.json
          if [ -f /tmp/pocket-works-build-tail.log ]; then
            cp /tmp/pocket-works-build-tail.log .github/deploy-build.log
          else
            printf 'Build step did not produce a log.\n' > .github/deploy-build.log
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps.json .github/deploy-status.json .github/deploy-build.log
          git commit -m "Generate registry and record deployment diagnostics" || exit 0
          git push

      - name: Enforce validation result
        if: always()
        run: |
          test '${{ steps.install.outcome }}' = 'success'
          test '${{ steps.registry.outcome }}' = 'success'
          test '${{ steps.build.outcome }}' = 'success'
