name: Moss & Marble 1.9.1 hotfix

on:
  push:
    branches:
      - agent/moss-marble-1-9-1-hole-clearance

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/moss-marble-1-9-1-hole-clearance
          fetch-depth: 0

      - name: Apply deterministic hole-clearance fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          procedural = Path('apps/moss-marble/procedural.js')
          text = procedural.read_text()
          old = """function addFinalFunnel(blueprint, random, t) {
            const spread = .56 + random() * .07;
            blueprint.barriers.push(
              { material: 'wood', width: 17, height: 26, points: [{ t: t - .08, side: -spread }, { t, side: -.30 }, { t: t + .08, side: -.09 }] },
              { material: 'wood', width: 17, height: 26, points: [{ t: t - .08, side: spread }, { t, side: .30 }, { t: t + .08, side: .09 }] }
            );
            blueprint.landforms.push({ kind: 'mound', t: t - .04, side: (random() - .5) * .20, length: 260, width: 190, height: 10 + random() * 6, asymmetry: (random() - .5) * .5, falloff: 1.7 });
            blueprint.tags.push('funnel');
          }"""
          new = """function addFinalFunnel(blueprint, random, t) {
            const spread = .58 + random() * .05;
            const neck = .22;
            blueprint.barriers.push(
              { material: 'wood', width: 17, height: 26, points: [{ t: t - .09, side: -spread }, { t: t - .025, side: -.38 }, { t: t + .035, side: -neck }] },
              { material: 'wood', width: 17, height: 26, points: [{ t: t - .09, side: spread }, { t: t - .025, side: .38 }, { t: t + .035, side: neck }] }
            );
            blueprint.landforms.push({ kind: 'mound', t: t - .06, side: (random() - .5) * .18, length: 240, width: 180, height: 8 + random() * 5, asymmetry: (random() - .5) * .45, falloff: 1.75 });
            blueprint.tags.push('funnel');
          }"""
          if old not in text:
              raise SystemExit('procedural funnel marker not found')
          text = text.replace(old, new).replace('addFinalFunnel(blueprint, random, .87);', 'addFinalFunnel(blueprint, random, .84);')
          procedural.write_text(text)

          course = Path('apps/moss-marble/course19.js')
          text = course.read_text()
          marker = """function resolveProp(level, prop, index) {"""
          helper = """function wallDistanceToPoint(wall, point) {
            const nearest = closestPointOnSegment(point, { x: wall.ax, y: wall.ay }, { x: wall.bx, y: wall.by });
            return Math.hypot(point.x - nearest.x, point.y - nearest.y) - Number(wall.thickness || 0) * .5;
          }

          function clearHoleApproach(walls, hole) {
            const clearance = Math.max(94, Number(hole?.r || 31) * 3);
            return walls.filter((wall) => wallDistanceToPoint(wall, hole) >= clearance);
          }

          function resolveProp(level, prop, index) {"""
          if marker not in text:
              raise SystemExit('course19 helper marker not found')
          text = text.replace(marker, helper, 1)
          old_barriers = "const barriers = (blueprint.barriers || []).flatMap((barrier, index) => resolveBarrier(level, barrier, index));"
          new_barriers = "const resolvedBarriers = (blueprint.barriers || []).flatMap((barrier, index) => resolveBarrier(level, barrier, index));\n  const barriers = clearHoleApproach(resolvedBarriers, level.hole);"
          if old_barriers not in text:
              raise SystemExit('course19 barrier marker not found')
          course.write_text(text.replace(old_barriers, new_barriers, 1))

          audit = Path('apps/moss-marble/audit19.mjs')
          text = audit.read_text()
          text = text.replace(
              "const assert = (condition, message) => { if (!condition) failures.push(message); };",
              """const assert = (condition, message) => { if (!condition) failures.push(message); };
          const wallDistanceToPoint = (wall, point) => {
            const dx = wall.bx - wall.ax;
            const dy = wall.by - wall.ay;
            const lengthSq = dx * dx + dy * dy;
            const t = lengthSq ? Math.max(0, Math.min(1, ((point.x - wall.ax) * dx + (point.y - wall.ay) * dy) / lengthSq)) : 0;
            const x = wall.ax + dx * t;
            const y = wall.ay + dy * t;
            return Math.hypot(point.x - x, point.y - y) - Number(wall.thickness || 0) * .5;
          };""",
              1,
          )
          text = text.replace(
              "for (const seed of [1, 17, 50291, 0xDEADBEEF]) {",
              "for (const seed of [1, 2, 3, 5, 8, 13, 17, 21, 34, 55, 89, 144, 233, 50291, 0xDEADBEEF]) {",
              1,
          )
          needle = "assert(level.course18?.triangleCount === 1932, `compiled ${seed}/${depth}: unexpected mesh budget`);"
          insertion = needle + "\n    const holeClearance = Math.max(94, Number(level.hole?.r || 31) * 3);\n    for (const wall of level.walls || []) {\n      assert(wallDistanceToPoint(wall, level.hole) >= holeClearance, `compiled ${seed}/${depth}: wall blocks hole approach`);\n    }"
          if needle not in text:
              raise SystemExit('audit assertion marker not found')
          text = text.replace(needle, insertion, 1).replace("console.log('Moss & Marble 1.9 audit passed');", "console.log('Moss & Marble 1.9.1 audit passed');")
          audit.write_text(text)

          config_path = Path('apps/moss-marble/app.config.json')
          config = json.loads(config_path.read_text())
          config['version'] = '1.9.1'
          config['releaseDate'] = '2026-07-15'
          config['releaseDateTime'] = '2026-07-15T11:00:00+03:00'
          config['cacheName'] = 'moss-marble-v1.9.1'
          config['changelog'] = [
              'Финальные деревянные направляющие бесконечной оранжереи отодвинуты от чашки и больше не перекрывают лунку.',
              'Компилятор автоматически удаляет любой сегмент стены, нарушающий безопасную зону подхода к лунке.',
              'Аудит расширен до 420 процедурных секций и отдельно проверяет свободный подход к чашке.',
              'Версия офлайн-кеша обновлена, чтобы исправление гарантированно дошло до уже установленных клиентов.'
          ]
          config_path.write_text(json.dumps(config, ensure_ascii=False, indent=2) + '\n')

          sw = Path('apps/moss-marble/sw.js')
          text = sw.read_text()
          text = text.replace("moss-marble-v1.9.0", "moss-marble-v1.9.1")
          text = text.replace("const APP_VERSION = '1.9.0';", "const APP_VERSION = '1.9.1';")
          start = text.index('const RELEASE_NOTES = [')
          end = text.index('];', start) + 2
          notes = """const RELEASE_NOTES = [
            'Финальные направляющие бесконечного режима больше не перекрывают лунку.',
            'Добавлена обязательная безопасная зона вокруг чашки для любых процедурных стен.',
            'Генератор проверен на 420 детерминированных секциях.',
            'Офлайн-кеш обновлён до версии 1.9.1.'
          ];"""
          text = text[:start] + notes + text[end:]
          text = text.replace('v=1.9.0', 'v=1.9.1')
          sw.write_text(text)

          index = Path('apps/moss-marble/index.html')
          index.write_text(index.read_text().replace('1.9.0', '1.9.1'))
          PY

      - name: Verify Moss & Marble
        run: |
          node --check apps/moss-marble/procedural.js
          node --check apps/moss-marble/course19.js
          node --check apps/moss-marble/audit19.mjs
          node apps/moss-marble/audit19.mjs

      - name: Commit hotfix and remove one-shot workflow
        shell: bash
        run: |
          rm .github/workflows/moss-marble-hotfix.yml
          git config user.name "Pocket Works Agent"
          git config user.email "actions@users.noreply.github.com"
          git add apps/moss-marble/procedural.js apps/moss-marble/course19.js apps/moss-marble/audit19.mjs apps/moss-marble/app.config.json apps/moss-marble/sw.js apps/moss-marble/index.html .github/workflows/moss-marble-hotfix.yml
          git commit -m "Moss & Marble 1.9.1: очистить подход к лунке"
          git push origin HEAD:agent/moss-marble-1-9-1-hole-clearance
