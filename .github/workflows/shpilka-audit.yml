name: Audit ШПИЛЬКА 2.3

on:
  pull_request:
    paths:
      - "apps/shpilka/**"
      - "scripts/audit-shpilka-2-3.mjs"
      - ".github/workflows/shpilka-audit.yml"

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run deterministic audit
        id: audit
        shell: bash
        run: |
          set +e
          node scripts/audit-shpilka-2-3.mjs > shpilka-audit-result.txt 2>&1
          code=$?
          cat shpilka-audit-result.txt
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Persist audit output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shpilka-audit-result.txt
          git commit -m "Record ШПИЛЬКА 2.3 audit output" || true
          git push origin HEAD:${{ github.head_ref }}
      - name: Enforce audit
        run: test "${{ steps.audit.outputs.exit_code }}" = "0"
