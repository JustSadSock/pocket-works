name: Generate UDEL registry once

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/generate-udel-registry-once.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  registry:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate application registry
        run: npm run registry:build

      - name: Commit registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git commit -m "Publish UDEL 2.0 in app registry" || exit 0
          git pull --rebase origin main
          git push

# Retry from the current main after concurrent application merges.
