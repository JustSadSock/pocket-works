name: Build Petlya 17 3D rewrite

on:
  push:
    branches: [agent/petlya-17-3d-rewrite]
    paths:
      - ".github/workflows/build-petlya-17-3d.yml"

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/petlya-17-3d-rewrite
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck 3D rewrite
        run: npm run typecheck --workspace=@pocket-works/petlya-17

      - name: Test track math
        run: npm run test --workspace=@pocket-works/petlya-17

      - name: Build enhanced application
        run: npm run build --workspace=@pocket-works/petlya-17

      - name: Remove obsolete quick-runtime files
        run: rm -f apps/petlya-17/velocity-core.js apps/petlya-17/workshop.js

      - name: Regenerate launcher registry
        run: node scripts/build-registry.mjs

      - name: Remove one-shot workflow
        run: git rm .github/workflows/build-petlya-17-3d.yml

      - name: Commit generated application
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json apps.json apps/petlya-17
          git commit -m "Build Petlya 17 3D application"
          git push origin HEAD:agent/petlya-17-3d-rewrite
