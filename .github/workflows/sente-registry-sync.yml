name: Sync SENTE Registry

on:
  push:
    branches:
      - agent/sente-gnugo-audit-v2
    paths:
      - 'apps/sente/app.config.json'
      - '.github/workflows/sente-registry-sync.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/sente-gnugo-audit-v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12'
      - run: node scripts/build-registry.mjs
      - name: Commit generated registry
        shell: bash
        run: |
          if git diff --quiet -- apps.json; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps.json
          git commit -m 'Generate SENTE 2.0 registry entry'
          git push origin HEAD:agent/sente-gnugo-audit-v2
