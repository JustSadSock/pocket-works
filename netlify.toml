[build]
  command = "rm -rf dist-site && mkdir -p dist-site && (npm run build:site > /tmp/pocket-build.log 2>&1; echo $? > /tmp/pocket-build.status); mkdir -p dist-site; cp /tmp/pocket-build.log dist-site/build-output.txt; cp /tmp/pocket-build.status dist-site/build-status.txt; exit 0"
  publish = "dist-site"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/apps/*/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/*/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/apps.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
