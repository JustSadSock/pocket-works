[build]
  command = "npm run validate:launcher && npm run validate:capabilities && rm -rf dist-site && mkdir -p dist-site && printf '<!doctype html><title>launcher capabilities ok</title><h1>launcher capabilities ok</h1>' > dist-site/index.html"
  publish = "dist-site"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/apps/*/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/*/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/apps.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
