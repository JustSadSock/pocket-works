[build]
  command = "node --check apps/shpilka/engine-v2-advanced.js && node --check apps/shpilka/engine-v2-advanced-fixes.js && node --check apps/shpilka/app.js && node --check apps/shpilka/sw.js && npm run build:site"
  publish = "dist-site"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/apps/*/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/*/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/apps.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
