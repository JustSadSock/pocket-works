[build]
  command = "mkdir -p dist-site && (npm run test:shpilka > /tmp/shpilka-audit.txt 2>&1; code=$?; name=$(tail -n 8 /tmp/shpilka-audit.txt | tr '\n' '_' | tr -cd '[:alnum:]А-Яа-яЁё_ .:-' | cut -c1-150 | tr ' ' '-'); cp /tmp/shpilka-audit.txt \"dist-site/audit-${code}-${name}.html\"; true)"
  publish = "dist-site"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=0, must-revalidate"
